# Render Blueprint — деплой одним кликом из GitHub.
# Ключ OPENAI_API_KEY задаётся в дашборде Render (sync:false), в репозиторий не попадает.
services:
  - type: web
    name: turkford-diagnostic
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: EVAL_MODEL
        value: gpt-4o
      - key: WHISPER_MODEL
        value: whisper-1
      - key: PYTHON_VERSION
        value: "3.11.9"
